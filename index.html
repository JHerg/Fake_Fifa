<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Funino Pro - Season 25/26</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-container">
        <div class="team-block">
            <select id="teamLeft" class="team-select">
                <option value="Bayer Leverkusen">Bayer Leverkusen</option>
                <option value="FC Bayern" selected>FC Bayern</option>
                <option value="VfB Stuttgart">VfB Stuttgart</option>
                <option value="Borussia Dortmund">Borussia Dortmund</option>
                <option value="RB Leipzig">RB Leipzig</option>
                <option value="Eintracht Frankfurt">Eintracht Frankfurt</option>
                <option value="TSG Hoffenheim">TSG Hoffenheim</option>
                <option value="1. FC Heidenheim">1. FC Heidenheim</option>
                <option value="Werder Bremen">Werder Bremen</option>
                <option value="SC Freiburg">SC Freiburg</option>
                <option value="FC Augsburg">FC Augsburg</option>
                <option value="VfL Wolfsburg">VfL Wolfsburg</option>
                <option value="Mainz 05">Mainz 05</option>
                <option value="Gladbach">Gladbach</option>
                <option value="Union Berlin">Union Berlin</option>
                <option value="FC St. Pauli">FC St. Pauli</option>
                <option value="Hamburger SV">Hamburger SV</option>
                <option value="1. FC Köln">1. FC Köln</option>
            </select>
            <select id="playerLeft" class="player-select"></select>
        </div>

        <div class="score-box red" id="scoreRed">0</div>
        <div class="score-box timer" id="timerDisplay">2:00</div>
        
        <div class="main-controls">
            <button id="btnStart">Spiel starten</button>
            <div class="icon-group">
                <button id="btnSettings" class="icon-btn" title="Einstellungen">⚙️</button>
                <button id="btnSound" class="icon-btn" title="Sound an/aus">🔊</button>
            </div>
        </div>

        <div class="score-box blue" id="scoreBlue">0</div>

        <div class="team-block">
            <select id="teamRight" class="team-select">
                <option value="Bayer Leverkusen">Bayer Leverkusen</option>
                <option value="FC Bayern">FC Bayern</option>
                <option value="VfB Stuttgart">VfB Stuttgart</option>
                <option value="Borussia Dortmund" selected>Borussia Dortmund</option>
                <option value="RB Leipzig">RB Leipzig</option>
                <option value="Eintracht Frankfurt">Eintracht Frankfurt</option>
                <option value="TSG Hoffenheim">TSG Hoffenheim</option>
                <option value="1. FC Heidenheim">1. FC Heidenheim</option>
                <option value="Werder Bremen">Werder Bremen</option>
                <option value="SC Freiburg">SC Freiburg</option>
                <option value="FC Augsburg">FC Augsburg</option>
                <option value="VfL Wolfsburg">VfL Wolfsburg</option>
                <option value="Mainz 05">Mainz 05</option>
                <option value="Gladbach">Gladbach</option>
                <option value="Union Berlin">Union Berlin</option>
                <option value="FC St. Pauli">FC St. Pauli</option>
                <option value="Hamburger SV">Hamburger SV</option>
                <option value="1. FC Köln">1. FC Köln</option>
            </select>
            <select id="playerRight" class="player-select"></select>
        </div>

        <select id="aiSelect" class="team-select">
            <option value="human">Spieler 2 (Mensch)</option>
            <option value="ai1">KI (Stufe 1)</option>
            <option value="ai2">KI (Stufe 2)</option>
            <option value="ai3">KI (Stufe 3)</option>
        </select>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div id="commentary-box" class="hidden">
            <span class="mic-icon">🎙️</span>
            <span id="commentary-text"></span>
        </div>

        <div id="settings-panel" class="overlay hidden">
            <div class="overlay-content">
                <h2>Spieleinstellungen</h2>
                <div class="setting-row"><label>🎥 Replay</label><input type="checkbox" id="checkReplay" checked></div>
                <div class="setting-row"><label>🌦️ Wetter</label><select id="selectWeather" class="player-select"><option value="sun">Sonne</option><option value="rain">Regen</option><option value="snow">Schnee</option></select></div>
                <div class="setting-row"><label>🌗 Nacht</label><select id="selectTime" class="player-select"><option value="day">Tag</option><option value="night">Nacht</option></select></div>
                <div class="setting-row"><label>🏆 Turnier</label><input type="checkbox" id="checkTournament"></div>
                
                <div style="border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; margin-top: 10px;">
                    <div class="setting-row"><label>🎙️ Kommentar</label><input type="checkbox" id="checkCommentary" checked></div>
                    <div class="setting-row">
                        <label>🗣️ Stimme</label>
                        <select id="selectVoice" class="player-select" style="max-width: 150px;">
                            <option value="default">Standard</option>
                        </select>
                    </div>
                </div>
                
                <button id="btnCloseSettings" style="margin-top: 15px;">Schließen & Speichern</button>
            </div>
        </div>

        <div id="tournament-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>🏆 Turnier</h2>
                <div id="bracket-container"></div>
                <button id="btnNextMatch">Nächstes Spiel</button>
            </div>
        </div>
    </div>

    <div id="tabelle-container">
        <h2>Ewige Tabelle <span style="font-size: 14px; opacity: 0.5;">(🎮 Gamepad Support aktiv)</span></h2>
        <table id="leaderboard">
            <thead><tr><th>Team</th><th>S</th><th>U</th><th>N</th></tr></thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <script src="game.js"></script>
</body>
</html>
