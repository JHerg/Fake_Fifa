<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fake FIFA - Funino Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-container">
        <div class="team-block">
            <select id="teamLeft" class="team-select">
                <option value="Bayer Leverkusen">Bayer Leverkusen</option>
                <option value="FC Bayern" selected>FC Bayern</option>
                <option value="VfB Stuttgart">VfB Stuttgart</option>
                <option value="Dortmund">Dortmund</option>
                <option value="RB Leipzig">RB Leipzig</option>
                <option value="Eintracht Frankfurt">Eintracht Frankfurt</option>
                <option value="Hoffenheim">Hoffenheim</option>
                <option value="Heidenheim">Heidenheim</option>
                <option value="Werder Bremen">Werder Bremen</option>
                <option value="Freiburg">Freiburg</option>
                <option value="Augsburg">Augsburg</option>
                <option value="Wolfsburg">Wolfsburg</option>
                <option value="Mainz 05">Mainz 05</option>
                <option value="Gladbach">Gladbach</option>
                <option value="Union Berlin">Union Berlin</option>
                <option value="Bochum">Bochum</option>
                <option value="FC St. Pauli">FC St. Pauli</option>
                <option value="Holstein Kiel">Holstein Kiel</option>
            </select>
            <select id="playerLeft" class="player-select"></select>
        </div>

        <div class="score-box red" id="scoreRed">0</div>
        <div class="score-box timer" id="timerDisplay">2:00</div>
        
        <div class="main-controls">
            <button id="btnStart">Spiel starten</button>
            <div class="icon-group">
                <button id="btnSettings" class="icon-btn" title="Einstellungen">⚙️</button>
                <button id="btnSound" class="icon-btn" title="Sound an/aus">🔊</button>
            </div>
        </div>

        <div class="score-box blue" id="scoreBlue">0</div>

        <div class="team-block">
            <select id="teamRight" class="team-select">
                <option value="Bayer Leverkusen">Bayer Leverkusen</option>
                <option value="FC Bayern">FC Bayern</option>
                <option value="VfB Stuttgart">VfB Stuttgart</option>
                <option value="Dortmund" selected>Dortmund</option>
                <option value="RB Leipzig">RB Leipzig</option>
                <option value="Eintracht Frankfurt">Eintracht Frankfurt</option>
                <option value="Hoffenheim">Hoffenheim</option>
                <option value="Heidenheim">Heidenheim</option>
                <option value="Werder Bremen">Werder Bremen</option>
                <option value="Freiburg">Freiburg</option>
                <option value="Augsburg">Augsburg</option>
                <option value="Wolfsburg">Wolfsburg</option>
                <option value="Mainz 05">Mainz 05</option>
                <option value="Gladbach">Gladbach</option>
                <option value="Union Berlin">Union Berlin</option>
                <option value="Bochum">Bochum</option>
                <option value="FC St. Pauli">FC St. Pauli</option>
                <option value="Holstein Kiel">Holstein Kiel</option>
            </select>
            <select id="playerRight" class="player-select"></select>
        </div>

        <select id="aiSelect" class="team-select">
            <option value="human">Spieler 2 (Mensch)</option>
            <option value="ai1">KI (Stufe 1)</option>
            <option value="ai2">KI (Stufe 2)</option>
            <option value="ai3">KI (Stufe 3)</option>
        </select>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <button id="mobileDashBtn">⚡ DASH</button>

        <div id="settings-panel" class="overlay hidden">
            <div class="overlay-content">
                <h2>Spieleinstellungen</h2>
                <div class="setting-row">
                    <label>🎥 Instant Replay</label>
                    <input type="checkbox" id="checkReplay" checked>
                </div>
                <div class="setting-row">
                    <label>🌦️ Wetter</label>
                    <select id="selectWeather" class="player-select" style="width: 150px; text-align: center;">
                        <option value="sun">☀️ Sonnig</option>
                        <option value="rain">🌧️ Regen</option>
                        <option value="snow">❄️ Schnee</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>🏆 Turnier-Modus</label>
                    <input type="checkbox" id="checkTournament">
                </div>
                <button id="btnCloseSettings">Speichern & Schließen</button>
            </div>
        </div>

        <div id="tournament-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>🏆 Turnier-Baum</h2>
                <div id="bracket-container"></div>
                <button id="btnNextMatch">Nächstes Spiel starten</button>
            </div>
        </div>
    </div>

    <div id="tabelle-container">
        <h2>Ewige Tabelle</h2>
        <table id="leaderboard">
            <thead>
                <tr>
                    <th>Team</th>
                    <th>Siege</th>
                    <th>Unentschieden</th>
                    <th>Niederlagen</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
            </tbody>
        </table>
    </div>

    <script src="game.js"></script>
</body>
</html>
