<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Funino Pro - Season 25/26</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-container">
        <div class="team-block">
            <div style="display: flex; align-items: center; margin-bottom: 5px;">
                <img id="logoLeft" alt="Logo" style="width: 30px; height: 30px; margin-right: 10px;">
                <select id="teamLeft" class="team-select">
                    <option value="Rheinland Leverkusen">Rheinland Leverkusen</option>
                    <option value="FC Bavaria München" selected>FC Bavaria München</option>
                    <option value="SC Schwaben Stuttgart">SC Schwaben Stuttgart</option>
                    <option value="SC Westfalen Dortmund">SC Westfalen Dortmund</option>
                    <option value="Rasenclub Leipzig">Rasenclub Leipzig</option>
                    <option value="SG Frankfurt">SG Frankfurt</option>
                    <option value="1899 Kraichgau">1899 Kraichgau</option>
                    <option value="FC Ostalb Heidenheim">FC Ostalb Heidenheim</option>
                    <option value="SV Weser Bremen">SV Weser Bremen</option>
                    <option value="FC Breisgau">FC Breisgau</option>
                    <option value="Schwaben Augsburg">Schwaben Augsburg</option>
                    <option value="Wölfe Niedersachsen">Wölfe Niedersachsen</option>
                    <option value="FSV Rheinhessen">FSV Rheinhessen</option>
                    <option value="Borussia Niederrhein">Borussia Niederrhein</option>
                    <option value="SC Eisern Berlin">SC Eisern Berlin</option>
                    <option value="Kiezclub Hamburg">Kiezclub Hamburg</option>
                    <option value="Hanseaten Hamburg">Hanseaten Hamburg</option>
                    <option value="Domstadt Köln">Domstadt Köln</option>
                </select>
            </div>
            <select id="playerLeft" class="player-select"></select>
        </div>

        <div class="score-box red" id="scoreRed">0</div>
        <div class="score-box timer" id="timerDisplay">2:00</div>
        
        <div class="main-controls">
            <button id="btnStart">Spiel starten</button>
            <div class="icon-group">
                <button id="btnSettings" class="icon-btn" title="Einstellungen">⚙️</button>
                <button id="btnSound" class="icon-btn" title="Sound an/aus">🔊</button>
            </div>
        </div>

        <div class="score-box blue" id="scoreBlue">0</div>

        <div class="team-block">
            <div style="display: flex; align-items: center; margin-bottom: 5px;">
                <img id="logoRight" alt="Logo" style="width: 30px; height: 30px; margin-right: 10px;">
                <select id="teamRight" class="team-select">
                    <option value="Rheinland Leverkusen">Rheinland Leverkusen</option>
                    <option value="FC Bavaria München">FC Bavaria München</option>
                    <option value="SC Schwaben Stuttgart">SC Schwaben Stuttgart</option>
                    <option value="SC Westfalen Dortmund" selected>SC Westfalen Dortmund</option>
                    <option value="Rasenclub Leipzig">Rasenclub Leipzig</option>
                    <option value="SG Frankfurt">SG Frankfurt</option>
                    <option value="1899 Kraichgau">1899 Kraichgau</option>
                    <option value="FC Ostalb Heidenheim">FC Ostalb Heidenheim</option>
                    <option value="SV Weser Bremen">SV Weser Bremen</option>
                    <option value="FC Breisgau">FC Breisgau</option>
                    <option value="Schwaben Augsburg">Schwaben Augsburg</option>
                    <option value="Wölfe Niedersachsen">Wölfe Niedersachsen</option>
                    <option value="FSV Rheinhessen">FSV Rheinhessen</option>
                    <option value="Borussia Niederrhein">Borussia Niederrhein</option>
                    <option value="SC Eisern Berlin">SC Eisern Berlin</option>
                    <option value="Kiezclub Hamburg">Kiezclub Hamburg</option>
                    <option value="Hanseaten Hamburg">Hanseaten Hamburg</option>
                    <option value="Domstadt Köln">Domstadt Köln</option>
                </select>
            </div>
            <select id="playerRight" class="player-select"></select>
        </div>

        <select id="aiSelect" class="team-select">
            <option value="human">Spieler 2 (Mensch)</option>
            <option value="ai1">KI (Stufe 1)</option>
            <option value="ai2">KI (Stufe 2)</option>
            <option value="ai3">KI (Stufe 3)</option>
        </select>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>

        <div id="settings-panel" class="overlay hidden">
            <div class="overlay-content">
                <h2>Spieleinstellungen</h2>
                <div class="setting-row"><label>🎥 Replay</label><input type="checkbox" id="checkReplay" checked></div>
                <div class="setting-row"><label>🌦️ Wetter</label><select id="selectWeather" class="player-select"><option value="sun">Sonne</option><option value="rain">Regen</option><option value="snow">Schnee</option></select></div>
                <div class="setting-row"><label>🌗 Nacht</label><select id="selectTime" class="player-select"><option value="day">Tag</option><option value="night">Nacht</option></select></div>
                <div class="setting-row">
                    <label>🎮 Modus</label>
                    <select id="selectMode" class="player-select">
                        <option value="free">Freies Spiel</option>
                        <option value="tournament">Turnier</option>
                        <option value="league">Liga</option>
                    </select>
                </div>
                
                <div style="border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; margin-top: 10px;">
                    <div class="setting-row"><label>🎙️ Kommentar</label><input type="checkbox" id="checkCommentary" checked></div>
                    <div class="setting-row">
                        <label>🗣️ Stimme</label>
                        <select id="selectVoice" class="player-select" style="max-width: 150px;">
                            <option value="default">Standard</option>
                        </select>
                    </div>
                </div>
                <button id="btnCloseSettings" style="margin-top: 15px;">Schließen</button>
            </div>
        </div>

        <div id="analytics-overlay" class="overlay hidden">
            <div class="analytics-content">
                <h2 class="magenta-line">Match Analytics</h2>
                
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <h3>Ballbesitz</h3>
                        <p><span style="color:#B40055" id="statPoss1">50%</span> - <span style="color:#004BA0" id="statPoss2">50%</span></p>
                    </div>
                    <div class="kpi-card">
                        <h3>Torschüsse</h3>
                        <p><span style="color:#B40055" id="statShots1">0</span> - <span style="color:#004BA0" id="statShots2">0</span></p>
                    </div>
                    <div class="kpi-card">
                        <h3>Laufdistanz</h3>
                        <p><span style="color:#B40055" id="statDist1">0m</span> - <span style="color:#004BA0" id="statDist2">0m</span></p>
                    </div>
                </div>

                <div class="heatmap-container">
                    <h3>Heatmap (Ballbewegung)</h3>
                    <canvas id="heatmapCanvas" width="600" height="360"></canvas>
                </div>

                <button id="btnCloseAnalytics" class="btn-primary">Zur Ewigen Tabelle</button>
            </div>
        </div>

        <div id="tournament-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>🏆 Turnier</h2>
                <div id="bracket-container"></div>
                <button id="btnNextMatch">Nächstes Spiel</button>
            </div>
        </div>

        <div id="league-overlay" class="overlay hidden">
            <div class="overlay-content" style="max-width: 600px; width: 90%;">
                <h2 id="leagueTitle" class="magenta-line">🏆 Liga</h2>
                <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                    <div style="flex: 2; min-width: 300px;">
                        <div id="league-standings" style="margin-bottom: 20px;"></div>
                    </div>
                    <div style="flex: 1; min-width: 200px;">
                        <div id="league-last-results" style="margin-bottom: 20px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px;"></div>
                    </div>
                </div>
                <h3 id="leagueNextMatchText" style="color: #ccc;">Nächstes Spiel: - vs -</h3>
                <button id="btnNextLeagueMatch" class="btn-primary">Spielen</button>
                <button id="btnCloseLeague" style="margin-top: 10px; background: #444;">Schließen</button>
            </div>
        </div>
    </div>

    <div id="tabelle-container">
        <h2>Ewige Tabelle <span style="font-size: 14px; opacity: 0.5;">(🎮 Gamepad & 3D Audio aktiv)</span></h2>
        <table id="leaderboard">
            <thead><tr><th>Team</th><th>S</th><th>U</th><th>N</th></tr></thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <script src="game.js"></script>
</body>
</html>
